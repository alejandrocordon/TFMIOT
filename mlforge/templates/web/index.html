<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLForge - Image Classifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .drop-zone {
            border: 2px dashed #d0d5dd;
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .drop-zone img {
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .drop-zone p { color: #666; }
        .drop-zone .icon { font-size: 48px; margin-bottom: 16px; }
        .results { margin-top: 16px; }
        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .result-item:last-child { border-bottom: none; }
        .result-label { flex: 1; font-weight: 500; }
        .result-score { font-family: monospace; color: #666; min-width: 60px; text-align: right; }
        .result-bar {
            flex: 2;
            background: #f0f0f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        .result-bar-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid #f0f0f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        input[type="file"] { display: none; }
        .powered { text-align: center; margin-top: 24px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Classifier</h1>
        <p class="subtitle">Drag and drop an image or click to browse. Runs entirely in your browser.</p>

        <div class="drop-zone" id="dropZone">
            <div id="preview">
                <div class="icon">📷</div>
                <p>Drop an image here or click to upload</p>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" />

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading model & classifying...</p>
        </div>

        <div id="results" class="results"></div>

        <p class="powered">Powered by MLForge + ONNX Runtime Web</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
